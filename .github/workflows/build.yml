name: Build APK
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'

      - name: Create Android scaffold
        run: |
          # Generate Android project scaffold (keeps our pubspec.yaml and lib/)
          flutter create --project-name bridge_android --org app.bridge --platforms=android .
          # Restore our source files
          git checkout -- pubspec.yaml lib/main.dart
          
      - name: Get Dependencies
        run: flutter pub get

      - name: Set min SDK
        run: |
          # Handle both Groovy and Kotlin DSL
          if [ -f android/app/build.gradle.kts ]; then
            sed -i 's/minSdk = .*/minSdk = 21/' android/app/build.gradle.kts
          elif [ -f android/app/build.gradle ]; then
            sed -i 's/minSdkVersion .*/minSdkVersion 21/' android/app/build.gradle
            sed -i 's/minSdk .*/minSdk = 21/' android/app/build.gradle
          fi
          
          # Copy custom manifest
          if [ -f AndroidManifest.xml.custom ]; then
            cp AndroidManifest.xml.custom android/app/src/main/AndroidManifest.xml
          fi

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "Bridge Android v1.0.${{ github.run_number }}"
          files: build/app/outputs/flutter-apk/app-release.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
