name: Build APK
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Initialize Flutter Project
        run: |
          # إنشاء مشروع جديد
          flutter create --project-name bridge_android --org app.bridge --platforms=android --overwrite .
          
          # استبدال ملفات الإعداد بالملفات المخصصة
          cp pubspec.yaml.custom pubspec.yaml
          mkdir -p lib
          cp main.dart.custom lib/main.dart
          cp AndroidManifest.xml.custom android/app/src/main/AndroidManifest.xml
          
          # إصلاح إصدار Kotlin Gradle Plugin في settings.gradle (للمشاريع الحديثة)
          sed -i 's/id "org.jetbrains.kotlin.android" version "[^"]*"/id "org.jetbrains.kotlin.android" version "1.9.20"/' android/settings.gradle
          
          # تأكيد الإصدار في build.gradle (للمشاريع الأقدم إذا لزم الأمر)
          sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "1.9.20"/' android/build.gradle || true

      - name: Get Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Rename APK for Release
        run: |
          mkdir -p release_assets
          cp build/app/outputs/flutter-apk/app-release.apk release_assets/bridge-android-latest.apk

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Bridge Android — Latest"
          body: "حمّل bridge-android-latest.apk وثبّته على جهازك"
          files: release_assets/bridge-android-latest.apk
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
