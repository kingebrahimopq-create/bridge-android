name: Build APK
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Create Android project
        run: |
          flutter create --project-name bridge_android --org app.bridge --platforms=android -a java .
          # Restore our files that flutter create may overwrite
          git checkout -- pubspec.yaml lib/main.dart

      - name: Get Dependencies
        run: flutter pub get

      - name: Set min SDK and permissions
        run: |
          # Update minSdkVersion to 21
          sed -i 's/minSdk = .*/minSdk = 21/' android/app/build.gradle.kts 2>/dev/null || \
          sed -i 's/minSdkVersion .*/minSdkVersion 21/' android/app/build.gradle 2>/dev/null || true
          
          # Copy custom manifest if exists
          if [ -f AndroidManifest.xml.custom ]; then
            cp AndroidManifest.xml.custom android/app/src/main/AndroidManifest.xml
          fi

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "Bridge Android v1.0.${{ github.run_number }}"
          files: build/app/outputs/flutter-apk/app-release.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
