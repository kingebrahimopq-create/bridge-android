name: Build APK
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Initialize Flutter Project
        run: |
          # إنشاء مشروع جديد نظيف
          flutter create --project-name bridge_android --org app.bridge --platforms=android --overwrite .

          # استبدال ملفات الإعداد بالملفات المخصصة
          cp pubspec.yaml.custom pubspec.yaml
          mkdir -p lib
          cp main.dart.custom lib/main.dart
          mkdir -p android/app/src/main
          cp AndroidManifest.xml.custom android/app/src/main/AndroidManifest.xml

          # Ensure local.properties contains a flutter.sdk entry so pluginManagement can find the flutter tools
          mkdir -p android
          cat > android/local.properties <<EOF
flutter.sdk=$FLUTTER_ROOT
EOF

          # write a robust settings.gradle that falls back to FLUTTER_ROOT when local.properties doesn't contain flutter.sdk
          cat > android/settings.gradle <<'EOF'
pluginManagement {
    def properties = new Properties()
    if (file("local.properties").exists()) {
        file("local.properties").withInputStream { properties.load(it) }
    }
    def flutterSdkPath = properties.getProperty("flutter.sdk")
    if (flutterSdkPath == null || flutterSdkPath.trim() == "") {
        flutterSdkPath = System.getenv("FLUTTER_ROOT")
    }
    assert flutterSdkPath != null : "flutter.sdk not set in local.properties and FLUTTER_ROOT not set"
    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-gradle-plugin" apply false
    id "com.android.application" apply false
    id "org.jetbrains.kotlin.android" apply false
}

include ":app"
EOF

          # تعديل ملف android/build.gradle لضمان التوافق
          cat > android/build.gradle <<EOF
allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = "../build"
subprojects {
    project.buildDir = "\${rootProject.buildDir}/\${project.name}"
}
subprojects {
    project.evaluationDependsOn(":app")
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
EOF

          # تعديل ملف android/app/build.gradle لضبط minSdkVersion و targetSdkVersion
          sed -i 's/minSdk = .*/minSdk = 21/' android/app/build.gradle || true
          sed -i 's/targetSdk = .*/targetSdk = 34/' android/app/build.gradle || true
          sed -i 's/compileSdk = .*/compileSdk = 34/' android/app/build.gradle || true

          # ترقية Gradle Wrapper إلى إصدار 8.2 ليتوافق مع AGP 8.2.1
          if [ -f android/gradle/wrapper/gradle-wrapper.properties ]; then
            sed -i 's/gradle-.*-all.zip/gradle-8.2-all.zip/' android/gradle/wrapper/gradle-wrapper.properties
          fi

      - name: Get Dependencies
        run: flutter pub get

      - name: Clean and Build APK
        run: |
          flutter clean
          flutter build apk --release --no-tree-shake-icons

      - name: Rename APK for Release
        run: |
          mkdir -p release_assets
          cp build/app/outputs/flutter-apk/app-release.apk release_assets/bridge-android-latest.apk

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Bridge Android — Latest"
          body: "تم إصلاح أخطاء التوافق بشكل نهائي وتحديث إصدارات Kotlin و Gradle و Gradle Wrapper. حمّل bridge-android-latest.apk وثبّته."
          files: release_assets/bridge-android-latest.apk
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
